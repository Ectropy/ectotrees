name: GHCR Cleanup

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (log deletions without performing them)"
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prune:
    name: Prune old sha-* container versions
    runs-on: ubuntu-latest
    steps:
      - name: Delete old sha-* versions
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: user
          token: ${{ secrets.GHCR_CLEANUP_TOKEN }}
          image-names: ectotrees
          image-tags: "sha-*"
          tag-selection: both
          cut-off: 1d
          keep-n-most-recent: 30
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
