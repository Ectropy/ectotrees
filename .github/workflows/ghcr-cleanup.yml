name: GHCR Cleanup

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prune:
    name: Prune old container versions
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete untagged and old sha-* versions
        uses: actions/delete-package-versions@v6
        with:
          package-name: ectotrees
          package-type: container
          min-versions-to-keep: 30
          ignore-versions: '^(latest|main|v\d+\.\d+\.\d+)$'
