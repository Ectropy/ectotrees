name: Docker Build

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Portainer redeploy
    needs: build
    # Only on version tags — these are the pushes that publish a fresh :latest.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # No GitHub API access needed — this job only curls an external webhook.
    permissions: {}
    steps:
      - name: Ping Portainer webhook
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        # Skip cleanly when no webhook is configured (forks/clones).
        # Set the PORTAINER_WEBHOOK_URL secret to enable auto-deploy.
        # No -f: we want Portainer's error body in the log, not just curl exit 22.
        # No -L: a redirect means the secret's URL is stale (e.g. http:// in
        # front of an auto-HTTPS proxy) — fail loud and point at the fix
        # instead of papering over the misconfigured secret.
        # No retries: webhook failures (orphaned webhook, bad token) are permanent
        # until fixed in Portainer, so fail fast and loud.
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL not set — skipping redeploy."
            exit 0
          fi
          echo "POSTing to the Portainer webhook..."
          status=$(curl -sS -o response.txt -w '%{http_code}' -X POST "$WEBHOOK_URL")
          echo "Portainer responded with HTTP $status"
          if [ -s response.txt ]; then
            echo "Response body:"
            cat response.txt
            echo
          else
            echo "(empty response body)"
          fi
          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            echo "Redeploy triggered successfully."
          else
            echo "::error::Portainer webhook returned HTTP $status — redeploy did NOT happen."
            echo "Troubleshooting:"
            echo "  - HTTP 500: the webhook is likely orphaned. Recreating or editing the"
            echo "    container in Portainer (anything other than the webhook itself) breaks"
            echo "    the webhook-to-container binding (portainer/portainer#7631)."
            echo "  - HTTP 404: the webhook token no longer exists in Portainer."
            echo "    Fix for 500/404: re-enable the container webhook in Portainer, then"
            echo "    update the PORTAINER_WEBHOOK_URL repo secret with the new URL."
            echo "  - HTTP 301/308: the URL is being redirected, not served — typically an"
            echo "    http:// secret in front of a proxy that auto-upgrades to https"
            echo "    (Caddy answers with a 308). curl does not follow redirects, so the"
            echo "    POST never reached Portainer. Run 'curl -sSI -X POST <url>' locally,"
            echo "    read the Location header, and update the secret to that URL."
            exit 1
          fi
